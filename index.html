<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>战略智慧导师 · 商镜</title>
    
    <!-- 核心库 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&family=Noto+Sans+SC:wght@300;400;700&display=swap');
        
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background-color: #f8f7f4; 
            margin: 0; 
            color: #4a4a4a;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        .font-serif-sc { font-family: 'Noto Serif SC', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .sidebar-bg { background-color: #f1f0e8; }
        .active-session { background-color: #ffffff; border: 1px solid #e5e4da; color: #5c5c54; }
        .sidebar-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .message-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .canvas-card {
            background: #ffffff;
            border: 1px solid #f0eee0;
            padding: 1.5rem;
            border-radius: 1.25rem;
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.03);
        }

        /* 文件预览小卡片 */
        .file-preview {
            animation: scaleIn 0.2s ease-out;
        }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `你是一位世界级的战略导师“商镜”。
思想内核：毛泽东辩证法（矛盾论）、孙子兵法、博弈论、品牌定位学。
任务：分析用户描述的现状或上传的文档/图片，识别核心矛盾，给出降维打击式的战略建议。
输出规范：必须严格以 JSON 格式响应：
{
  "reply": "导师深刻的中文回复（结合毛选视角，识别主要矛盾）",
  "canvasUpdate": {
    "industry": "行业本质提炼",
    "problem": "当前核心矛盾",
    "risk": "认知盲区与风险",
    "positioning": "战略破局位"
  }
}`;

        const App = () => {
            const [sessions, setSessions] = useState(() => {
                const saved = localStorage.getItem('shangjing_ultimate_v1');
                return saved ? JSON.parse(saved) : [{
                    id: Date.now(),
                    title: '新战略对话',
                    messages: [{ 
                        role: 'assistant', 
                        content: '您好，lanlan。我是您的战略导师。无论是医美转型的迷茫，还是商业博弈的困局，请详述现状。您也可以直接上传 PDF、Word、PPT 或行业图片，我们将以矛盾论为引，拨开迷雾。' 
                    }],
                    canvasData: { 
                        industry: '待感知...', problem: '待识别...', risk: '待评估...', positioning: '待推演...' 
                    }
                }];
            });
            const [currentSessionId, setCurrentSessionId] = useState(sessions[0].id);
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [activeTab, setActiveTab] = useState('chat');
            const [customKey, setCustomKey] = useState(localStorage.getItem('gemini_api_key_lanlan_final') || "");
            const [showSettings, setShowSettings] = useState(false);
            
            // 附件状态
            const [attachedFile, setAttachedFile] = useState(null);
            const fileInputRef = useRef(null);

            const scrollRef = useRef(null);
            const currentSession = sessions.find(s => s.id === currentSessionId) || sessions[0];

            useEffect(() => {
                localStorage.setItem('shangjing_ultimate_v1', JSON.stringify(sessions));
            }, [sessions]);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                if (window.lucide) window.lucide.createIcons();
            }, [currentSession.messages, activeTab, isSidebarOpen, attachedFile]);

            // 文件转 Base64 辅助函数
            const fileToBase64 = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = (e) => reject(e);
            });

            const callGemini = async (userText, base64Data, mimeType) => {
                const apiKey = customKey.trim();
                if (!apiKey) throw new Error('MISSING_KEY');
                
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                const parts = [{ text: userText }];
                if (base64Data) {
                    parts.push({
                        inlineData: {
                            mimeType: mimeType,
                            data: base64Data
                        }
                    });
                }

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts }],
                        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || 'API 响应错误');
                }
                return await response.json();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setAttachedFile({
                    file: file,
                    name: file.name,
                    type: file.type,
                    preview: file.type.startsWith('image/') ? URL.createObjectURL(file) : null
                });
            };

            const handleSend = async () => {
                if ((!input.trim() && !attachedFile) || isTyping) return;
                
                const userText = input || (attachedFile ? `分析该文件：${attachedFile.name}` : "");
                const fileToProcess = attachedFile;
                
                // 立即更新 UI
                const updatedSessionsBefore = sessions.map(s => 
                    s.id === currentSessionId ? { 
                        ...s, 
                        messages: [...s.messages, { 
                            role: 'user', 
                            content: userText,
                            attachment: fileToProcess ? { name: fileToProcess.name, type: fileToProcess.type } : null
                        }] 
                    } : s
                );
                setSessions(updatedBefore);
                setInput('');
                setAttachedFile(null);
                setIsTyping(true);

                try {
                    let base64 = null;
                    let mime = null;
                    if (fileToProcess) {
                        base64 = await fileToBase64(fileToProcess.file);
                        mime = fileToProcess.type;
                    }

                    const result = await callGemini(userText, base64, mime);
                    const aiRaw = result.candidates[0].content.parts[0].text;
                    const aiData = JSON.parse(aiRaw.match(/\{[\s\S]*\}/)?.[0] || aiRaw);
                    
                    setSessions(updatedBefore.map(s => s.id === currentSessionId ? { 
                        ...s, 
                        title: s.messages.length <= 2 ? userText.slice(0, 10) : s.title,
                        messages: [...s.messages, { role: 'assistant', content: aiData.reply }],
                        canvasData: { ...s.canvasData, ...aiData.canvasUpdate }
                    } : s));
                } catch (error) {
                    let msg = `思维暂时受阻：${error.message}`;
                    if (error.message === 'MISSING_KEY') msg = "请点击左下角设置图标填入 API Key 激活导师。";
                    setSessions(prev => prev.map(s => s.id === currentSessionId ? { ...s, messages: [...s.messages, { role: 'assistant', content: msg }] } : s));
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div className="flex h-screen overflow-hidden relative">
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/30 z-40 lg:hidden backdrop-blur-sm" onClick={() => setSidebarOpen(false)} />}

                    {/* 侧边栏 */}
                    <aside className={`sidebar-transition fixed lg:static z-50 h-full sidebar-bg border-r border-[#e5e1d5] flex flex-col w-72 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-72'}`}>
                        <div className="p-6">
                            <button onClick={() => {
                                const id = Date.now();
                                setSessions([{ id, title: '新战略推演', messages: [{role:'assistant', content:'战略演练室就绪。'}], canvasData: { industry: '待感知...', problem: '待识别...', risk: '待评估...', positioning: '待推演...' } }, ...sessions]);
                                setCurrentSessionId(id); setSidebarOpen(false);
                            }} className="w-full py-3.5 px-4 rounded-2xl border-2 border-dashed border-[#b5b5ad] text-[#8a8a80] hover:border-[#a89078] hover:text-[#a89078] transition-all flex items-center justify-center gap-2 text-sm font-bold">
                                <i data-lucide="plus" className="w-4 h-4"></i> 新建推演
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto px-4 space-y-2 no-scrollbar">
                            <p className="px-2 text-[10px] text-[#b5b5ad] uppercase tracking-widest font-bold mb-4 mt-2">历史记录</p>
                            {sessions.map(s => (
                                <div key={s.id} onClick={() => { setCurrentSessionId(s.id); setSidebarOpen(false); }} className={`p-4 rounded-xl cursor-pointer transition-all ${currentSessionId === s.id ? 'active-session shadow-sm' : 'text-[#8a8a80] hover:bg-white/40'}`}>
                                    <div className="flex items-center gap-3 truncate">
                                        <i data-lucide="message-square" className="w-4 h-4 shrink-0"></i>
                                        <span className="text-sm truncate font-medium">{s.title}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-8 border-t border-[#e5e1d5] flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 rounded-full bg-[#a89078] flex items-center justify-center text-white text-[11px] font-bold shadow-inner">L</div>
                                <span className="text-xs font-bold text-[#b5b5ad] uppercase tracking-widest">LANLAN</span>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="text-[#c5c5bd] hover:text-[#a89078] transition-all"><i data-lucide="settings" className="w-5 h-5"></i></button>
                        </div>
                    </aside>

                    {/* 主内容 */}
                    <main className="flex-1 flex flex-col min-w-0 h-full bg-[#f8f7f4]">
                        <header className="px-6 py-6 flex justify-between items-center border-b border-[#e5e1d5] bg-[#f8f7f4]/80 backdrop-blur-md sticky top-0 z-30">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setSidebarOpen(true)} className="p-2 hover:bg-[#e9e7dc] rounded-lg text-[#a89078] lg:hidden"><i data-lucide="menu" className="w-5 h-5"></i></button>
                                <h1 className="text-xl lg:text-2xl font-serif-sc tracking-[0.2em] text-[#5c5c54] uppercase">商 镜</h1>
                            </div>
                            <div className="flex bg-[#e9e7dc] p-1 rounded-full border border-[#dcd9cc] shadow-inner">
                                <button onClick={() => setActiveTab('chat')} className={`px-5 lg:px-10 py-2 rounded-full text-xs font-bold transition-all ${activeTab === 'chat' ? 'bg-white text-[#5c5c54] shadow-sm' : 'text-[#a0a096]'}`}>对话</button>
                                <button onClick={() => setActiveTab('canvas')} className={`px-5 lg:px-10 py-2 rounded-full text-xs font-bold transition-all ${activeTab === 'canvas' ? 'bg-white text-[#5c5c54] shadow-sm' : 'text-[#a0a096]'}`}>画布</button>
                            </div>
                        </header>

                        <div className="flex-1 flex overflow-hidden">
                            <div className={`flex-1 flex flex-col h-full ${activeTab === 'canvas' ? 'hidden lg:flex' : 'flex'}`}>
                                <div ref={scrollRef} className="flex-1 overflow-y-auto px-6 lg:px-24 py-10 space-y-12 no-scrollbar">
                                    {currentSession.messages.map((msg, idx) => (
                                        <div key={idx} className={`flex message-fade ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`flex gap-6 max-w-[95%] lg:max-w-3xl ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                                <div className={`w-11 h-11 rounded-2xl flex items-center justify-center shrink-0 shadow-sm ${msg.role === 'assistant' ? 'bg-[#2a2a2a] text-[#f8f7f4]' : 'bg-[#a89078] text-white'}`}>
                                                    {msg.role === 'assistant' ? <i data-lucide="scroll-text" className="w-6 h-6"></i> : <span className="text-[16px] font-bold">L</span>}
                                                </div>
                                                <div className={`mt-1.5 flex flex-col gap-3 ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                                    {msg.attachment && (
                                                        <div className="flex items-center gap-3 bg-white/50 border border-[#e5e1d5] p-3 rounded-xl shadow-sm max-w-sm">
                                                            <i data-lucide="file-text" className="text-[#a89078] w-5 h-5"></i>
                                                            <span className="text-xs truncate text-[#8a8a80]">{msg.attachment.name}</span>
                                                        </div>
                                                    )}
                                                    <div className={`leading-relaxed text-[16px] lg:text-[17px] ${msg.role === 'user' ? 'text-[#8a8a80] text-right' : 'text-[#4a4a4a] font-serif-sc italic text-left'}`}>
                                                        {msg.content}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {isTyping && (
                                        <div className="ml-16 flex gap-2 items-center">
                                            <div className="w-1.5 h-1.5 bg-[#a89078] rounded-full animate-bounce"></div>
                                            <div className="w-1.5 h-1.5 bg-[#a89078] rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                            <div className="w-1.5 h-1.5 bg-[#a89078] rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                        </div>
                                    )}
                                </div>
                                
                                {/* 输入框与附件预览 */}
                                <div className="px-6 lg:px-24 pb-12">
                                    {attachedFile && (
                                        <div className="max-w-4xl mx-auto mb-4 file-preview flex items-center gap-4 bg-white p-3 rounded-2xl border border-[#a89078]/30 shadow-md">
                                            {attachedFile.preview ? (
                                                <img src={attachedFile.preview} className="w-10 h-10 rounded-lg object-cover" />
                                            ) : (
                                                <div className="w-10 h-10 bg-[#f1f0e8] rounded-lg flex items-center justify-center text-[#a89078]"><i data-lucide="file"></i></div>
                                            )}
                                            <div className="flex-1 truncate"><p className="text-xs font-bold text-[#5c5c54] truncate">{attachedFile.name}</p><p className="text-[10px] text-stone-400">准备上传进行推演...</p></div>
                                            <button onClick={() => setAttachedFile(null)} className="p-2 text-stone-300 hover:text-red-400"><i data-lucide="x" className="w-4 h-4"></i></button>
                                        </div>
                                    )}
                                    <div className="max-w-4xl mx-auto relative bg-white border-2 border-[#e5e1d5] rounded-2xl p-2 shadow-sm focus-within:border-[#a89078] transition-all flex items-end">
                                        <button onClick={() => fileInputRef.current.click()} className="p-4 text-[#d0cec1] hover:text-[#a89078] transition-colors"><i data-lucide="paperclip" className="w-6 h-6"></i></button>
                                        <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} accept="image/*,application/pdf,.doc,.docx,.ppt,.pptx" />
                                        <textarea className="w-full bg-transparent border-none focus:ring-0 px-2 py-4 text-base resize-none h-16 no-scrollbar" placeholder="详述挑战或上传文档..." value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())}/>
                                        <button onClick={handleSend} className="p-4 text-[#d0cec1] hover:text-[#a89078] transition-colors"><i data-lucide="arrow-up-right" className="w-8 h-8"></i></button>
                                    </div>
                                </div>
                            </div>

                            <div className={`w-full lg:w-[520px] bg-white border-l border-[#f0eee0] flex flex-col transition-all h-full ${activeTab === 'chat' ? 'hidden lg:flex' : 'flex'}`}>
                                <div className="flex-1 overflow-y-auto p-10 lg:p-16 space-y-16 no-scrollbar">
                                    <div>
                                        <h2 className="text-4xl font-serif-sc text-[#5c5c54] mb-3 tracking-tight">战略推演画布</h2>
                                        <div className="h-0.5 w-12 bg-[#5c5c54] mb-4"></div>
                                        <p className="text-[10px] text-[#a89078] uppercase tracking-[0.3em] font-bold">The Strategic Mapping Canvas</p>
                                    </div>
                                    <div className="space-y-14">
                                        <CanvasCard icon="globe" title="行业核心本质" content={currentSession.canvasData.industry} />
                                        <CanvasCard icon="zap" title="主要矛盾识别" content={currentSession.canvasData.problem} />
                                        <CanvasCard icon="shield-alert" title="思维漏洞与风险" content={currentSession.canvasData.risk} />
                                        <CanvasCard icon="search" title="博弈定位与执行" content={currentSession.canvasData.positioning} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* 设置弹窗 */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[60] p-6 text-center">
                            <div className="bg-white rounded-3xl p-10 max-w-sm w-full shadow-2xl">
                                <h3 className="font-serif-sc text-2xl mb-4 text-[#5c5c54]">导师觉醒配置</h3>
                                <p className="text-[11px] text-stone-400 mb-6 leading-relaxed">填入 API Key 开启全能模式。支持 PDF/图片多模态分析。</p>
                                <input 
                                    type="password" 
                                    className="w-full border-2 border-stone-100 rounded-xl px-5 py-3 text-sm focus:border-[#a89078] outline-none mb-6 text-center"
                                    placeholder="输入您的 Gemini API Key"
                                    value={customKey}
                                    onChange={(e) => {setCustomKey(e.target.value); localStorage.setItem('gemini_api_key_lanlan_final', e.target.value);}}
                                />
                                <button onClick={() => setShowSettings(false)} className="w-full bg-[#2a2a2a] text-white py-4 rounded-xl text-xs font-bold tracking-[0.2em] shadow-lg">确认激活</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CanvasCard = ({ icon, title, content }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return (
                <div className="flex gap-8 items-start group">
                    <div className="w-14 h-14 rounded-full border border-[#f0eee0] flex items-center justify-center shrink-0 text-[#c5c5bd] bg-[#fdfdfd] shadow-sm transition-all duration-500 group-hover:bg-[#2a2a2a] group-hover:text-white"><i data-lucide={icon} className="w-6 h-6"></i></div>
                    <div className="flex-1 pt-1"><h4 className="text-[11px] font-bold text-[#b5b5ad] uppercase tracking-[0.2em] mb-4 font-sans">{title}</h4><p className="text-[15px] lg:text-[16px] text-[#6a6a60] font-serif-sc italic leading-relaxed opacity-90">{content}</p></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
