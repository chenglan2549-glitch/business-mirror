<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>战略智慧导师</title>
    
    <!-- 核心库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&family=Noto+Sans+SC:wght@300;400;700&display=swap');
        
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background-color: #f8f7f4; 
            margin: 0; 
            color: #4a4a4a;
            -webkit-tap-highlight-color: transparent;
        }
        .font-serif-sc { font-family: 'Noto Serif SC', serif; }
        
        /* 滚动条隐藏 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 色彩校准 */
        .sidebar-bg { background-color: #f1f0e8; }
        .active-session { background-color: #ffffff; border: 1px solid #e5e4da; color: #5c5c54; }
        
        /* 动画逻辑 */
        .sidebar-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .message-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 画布卡片质感 */
        .canvas-card {
            background: #ffffff;
            border: 1px solid #f0eee0;
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const apiKey = ""; // 运行时自动填充

        const systemPrompt = `你是一位融合了多重文明智慧的绝世战略导师。
你的思想内核：
1. 中国传统战略：精通《孙子兵法》（势、地、法、将、道）与《毛选》辩证法（矛盾论、实践论、持久战、统一战线）。
2. 西方商业工具：精通博弈论（纳什均衡、非零和博弈）、品牌定位学（Ries & Trout）、战略布局。
3. 人性洞察：深谙消费心理学、恐惧与贪婪的博弈。

你的对话风格：
- 优雅且深刻：不要给出肤浅的建议，要直指问题的底层矛盾。
- 引导式启发：像导师一样，通过反问让用户意识到自己的思维盲区。
- 辩证思维：能够识别用户描述中“主要矛盾”与“次要矛盾”的转化。

请务必以 JSON 格式响应：
{
  "reply": "你对用户的深度对话回复（带点哲学意味，结合孙子兵法或毛选视角）",
  "canvasUpdate": {
    "industry": "提炼行业本质（15字内，如：信任成本极高的存量博弈）",
    "problem": "当前最核心矛盾提炼（15字内）",
    "risk": "识别潜在风险或人性弱点（15字内）",
    "positioning": "建议的博弈位或战略方向（15字内）"
  }
}`;

        const App = () => {
            const [sessions, setSessions] = useState(() => {
                const saved = localStorage.getItem('wisdom_mentor_pro_v1');
                return saved ? JSON.parse(saved) : [{
                    id: Date.now(),
                    title: '新战略对话',
                    messages: [{ 
                        role: 'assistant', 
                        content: '您好。我是您的战略导师。请详细描述您目前所处的行业、现状及面临的挑战。我们将通过博弈推演，为您拨开思维的迷雾。' 
                    }],
                    canvasData: { 
                        industry: '导师正在感知行业气场...', 
                        problem: '待矛盾识别...', 
                        risk: '待压力测试...',
                        positioning: '待推演博弈路径...'
                    }
                }];
            });
            const [currentSessionId, setCurrentSessionId] = useState(sessions[0].id);
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [activeTab, setActiveTab] = useState('chat');

            const scrollRef = useRef(null);
            const currentSession = sessions.find(s => s.id === currentSessionId) || sessions[0];

            useEffect(() => {
                localStorage.setItem('wisdom_mentor_pro_v1', JSON.stringify(sessions));
            }, [sessions]);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                if (window.lucide) window.lucide.createIcons();
            }, [currentSession.messages, activeTab, isSidebarOpen]);

            const handleSend = async () => {
                if (!input.trim() || isTyping) return;
                const userText = input;
                
                const updatedSessionsBefore = sessions.map(s => {
                    if (s.id === currentSessionId) {
                        return { ...s, messages: [...s.messages, { role: 'user', content: userText }] };
                    }
                    return s;
                });
                setSessions(updatedSessionsBefore);
                setInput('');
                setIsTyping(true);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userText }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    const result = await response.json();
                    const aiData = JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
                    
                    const updatedSessionsAfter = updatedSessionsBefore.map(s => {
                        if (s.id === currentSessionId) {
                            return { 
                                ...s, 
                                title: s.messages.length <= 2 ? userText.slice(0, 10) : s.title,
                                messages: [...s.messages, { role: 'assistant', content: aiData.reply }],
                                canvasData: {
                                    industry: aiData.canvasUpdate?.industry || s.canvasData.industry,
                                    problem: aiData.canvasUpdate?.problem || s.canvasData.problem,
                                    risk: aiData.canvasUpdate?.risk || s.canvasData.risk,
                                    positioning: aiData.canvasUpdate?.positioning || s.canvasData.positioning,
                                }
                            };
                        }
                        return s;
                    });
                    setSessions(updatedSessionsAfter);
                } catch (error) {
                    setSessions(prev => prev.map(s => s.id === currentSessionId ? { ...s, messages: [...s.messages, { role: 'assistant', content: "思维链路暂时受阻，请重新表述。" }] } : s));
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div className="flex h-screen overflow-hidden relative">
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/20 z-40 lg:hidden" onClick={() => setSidebarOpen(false)} />}

                    <aside className={`sidebar-transition fixed lg:static z-50 h-full sidebar-bg border-r border-[#e5e1d5] flex flex-col w-72 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-72'}`}>
                        <div className="p-6">
                            <button onClick={() => {
                                const id = Date.now();
                                setSessions([{ id, title: '新推演', messages: [{role:'assistant', content:'新推演室已就绪。请描述您的挑战。'}], canvasData: currentSession.canvasData }, ...sessions]);
                                setCurrentSessionId(id);
                                setSidebarOpen(false);
                            }} className="w-full py-3 px-4 rounded-xl border-2 border-dashed border-[#b5b5ad] text-[#8a8a80] hover:border-[#a89078] hover:text-[#a89078] transition-all flex items-center justify-center gap-2 text-sm font-bold">
                                <i data-lucide="plus" className="w-4 h-4"></i> 新建推演
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto px-4 space-y-2 no-scrollbar">
                            <p className="px-2 text-[10px] text-[#b5b5ad] uppercase tracking-widest font-bold mb-4 mt-2">历史记录分类</p>
                            {sessions.map(s => (
                                <div key={s.id} onClick={() => { setCurrentSessionId(s.id); setSidebarOpen(false); }} className={`p-4 rounded-xl cursor-pointer transition-all ${currentSessionId === s.id ? 'active-session shadow-sm' : 'text-[#8a8a80] hover:bg-white/40'}`}>
                                    <div className="flex items-center gap-3 truncate">
                                        <i data-lucide="message-square" className="w-4 h-4 shrink-0"></i>
                                        <span className="text-sm truncate font-medium">{s.title}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-8 border-t border-[#e5e1d5] flex items-center gap-4">
                            <div className="w-10 h-10 rounded-full bg-[#a89078] flex items-center justify-center text-white text-xs font-bold shadow-inner uppercase">L</div>
                            <span className="text-xs font-bold text-[#b5b5ad] tracking-[0.2em] uppercase">lanlan 用户空间</span>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col min-w-0 h-full">
                        <header className="px-6 py-6 flex justify-between items-center border-b border-[#e5e1d5] bg-[#f8f7f4]/80 backdrop-blur-md sticky top-0 z-30">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setSidebarOpen(true)} className="p-2 hover:bg-[#e9e7dc] rounded-lg text-[#a89078] lg:hidden"><i data-lucide="menu" className="w-5 h-5"></i></button>
                                <h1 className="text-xl lg:text-2xl font-serif-sc tracking-[0.2em] text-[#5c5c54] uppercase">战略智慧导师</h1>
                            </div>
                            <div className="flex bg-[#e9e7dc] p-1 rounded-full border border-[#dcd9cc] shadow-inner">
                                <button onClick={() => setActiveTab('chat')} className={`px-5 lg:px-10 py-2 rounded-full text-xs font-bold transition-all ${activeTab === 'chat' ? 'bg-white text-[#5c5c54] shadow-sm' : 'text-[#a0a096]'}`}>对话</button>
                                <button onClick={() => setActiveTab('canvas')} className={`px-5 lg:px-10 py-2 rounded-full text-xs font-bold transition-all ${activeTab === 'canvas' ? 'bg-white text-[#5c5c54] shadow-sm' : 'text-[#a0a096]'}`}>画布</button>
                            </div>
                        </header>

                        <div className="flex-1 flex overflow-hidden">
                            <div className={`flex-1 flex flex-col h-full ${activeTab === 'canvas' ? 'hidden lg:flex' : 'flex'}`}>
                                <div ref={scrollRef} className="flex-1 overflow-y-auto px-6 lg:px-24 py-10 space-y-12 no-scrollbar">
                                    {currentSession.messages.map((msg, idx) => (
                                        <div key={idx} className={`flex message-fade ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`flex gap-6 max-w-[95%] lg:max-w-3xl ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                                <div className={`w-10 h-10 rounded-2xl flex items-center justify-center shrink-0 shadow-sm ${msg.role === 'assistant' ? 'bg-[#2a2a2a] text-[#f8f7f4]' : 'bg-white border border-[#f0eee0] text-stone-300'}`}>
                                                    <i data-lucide={msg.role === 'assistant' ? "scroll-text" : "user"} className="w-5 h-5"></i>
                                                </div>
                                                <div className={`text-[15px] lg:text-[16px] leading-relaxed tracking-wide ${msg.role === 'user' ? 'text-[#8a8a80]' : 'text-[#4a4a4a] font-serif-sc italic'}`}>
                                                    {msg.content}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {isTyping && <div className="ml-16 flex gap-2"><div className="w-1.5 h-1.5 bg-[#a89078] rounded-full animate-bounce"></div><div className="w-1.5 h-1.5 bg-[#a89078] rounded-full animate-bounce [animation-delay:0.2s]"></div><div className="w-1.5 h-1.5 bg-[#a89078] rounded-full animate-bounce [animation-delay:0.4s]"></div></div>}
                                </div>
                                <div className="px-6 lg:px-24 pb-12">
                                    <div className="max-w-4xl mx-auto relative bg-white border-2 border-[#e5e1d5] rounded-2xl p-2 shadow-sm focus-within:border-[#a89078] transition-all flex items-end">
                                        <textarea className="w-full bg-transparent border-none focus:ring-0 px-4 py-4 text-sm resize-none h-16 no-scrollbar" placeholder="请告诉导师您的见解..." value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())}/>
                                        <button onClick={handleSend} className="p-4 text-[#d0cec1] hover:text-[#a89078] transition-colors"><i data-lucide="arrow-up-right" className="w-8 h-8"></i></button>
                                    </div>
                                </div>
                            </div>

                            <div className={`w-full lg:w-[520px] bg-white border-l border-[#f0eee0] flex flex-col transition-all h-full ${activeTab === 'chat' ? 'hidden lg:flex' : 'flex'}`}>
                                <div className="flex-1 overflow-y-auto p-10 lg:p-16 space-y-16 no-scrollbar">
                                    <h2 className="text-4xl font-serif-sc text-[#5c5c54] mb-2 tracking-tight">战略推演画布</h2>
                                    <div className="space-y-12 lg:space-y-16">
                                        <CanvasCard icon="globe" title="行业核心本质" content={currentSession.canvasData.industry} />
                                        <CanvasCard icon="zap" title="主要矛盾识别" content={currentSession.canvasData.problem} />
                                        <CanvasCard icon="shield-alert" title="思维漏洞与风险" content={currentSession.canvasData.risk} />
                                        <CanvasCard icon="search" title="博弈定位与执行" content={currentSession.canvasData.positioning} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const CanvasCard = ({ icon, title, content }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return (
                <div className="flex gap-8 items-start group">
                    <div className="w-14 h-14 rounded-full border border-[#f0eee0] flex items-center justify-center shrink-0 text-[#c5c5bd] bg-[#fdfdfd] shadow-sm transition-all duration-500 group-hover:bg-[#2a2a2a] group-hover:text-white"><i data-lucide={icon} className="w-6 h-6"></i></div>
                    <div className="flex-1 pt-1"><h4 className="text-[11px] font-bold text-[#b5b5ad] uppercase tracking-[0.2em] mb-4">{title}</h4><p className="text-[14px] text-[#6a6a60] font-serif-sc italic leading-relaxed">{content}</p></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
