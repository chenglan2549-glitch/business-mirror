<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>战略智慧导师</title>
    
    <!-- 核心驱动库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&family=Noto+Sans+SC:wght@300;400;700&display=swap');
        
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background-color: #f8f7f4; 
            margin: 0; 
            color: #4a4a4a;
            -webkit-tap-highlight-color: transparent;
        }
        .font-serif-sc { font-family: 'Noto Serif SC', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 经典米灰色调 */
        .sidebar-bg { background-color: #f1f0e8; }
        .active-session { background-color: #ffffff; border: 1px solid #e5e4da; color: #5c5c54; }
        .sidebar-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .message-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .canvas-card {
            background: #ffffff;
            border: 1px solid #f0eee0;
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
        }
        .canvas-card:hover {
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
            border-color: #dcd9cc;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const systemPrompt = `你是一位融合了多重文明智慧的绝世战略导师。
思想内核：
1. 东方传统：精通《毛选》矛盾论（识别并转化主要矛盾）、持久战智慧；精通《孙子兵法》（势、道、术、法、虚实）。
2. 西方商业：精通博弈论（纳什均衡、非零和博弈）、品牌定位学（占领心智）、战略布局模型。
3. 人性洞察：深谙消费心理学、恐惧与贪婪的博弈，擅长解构利益分配。

对话原则：
- 深刻且优雅，拒绝肤浅建议，直接刺破思维盲区。
- 采用辩证法，引导用户识别行业核心变量。

请务必严格以 JSON 格式响应：
{
  "reply": "你对用户的深度对话回复（带哲学底色，结合上述智慧视角，150-250字）",
  "canvasUpdate": {
    "industry": "提炼行业博弈底色（15字内）",
    "problem": "提炼当前最核心矛盾（15字内）",
    "risk": "识别潜在认知偏差或风险（15字内）",
    "positioning": "建议的战略定位或执行方向（15字内）"
  }
}`;

        const App = () => {
            const [sessions, setSessions] = useState(() => {
                const saved = localStorage.getItem('shangjing_pro_v1');
                return saved ? JSON.parse(saved) : [{
                    id: Date.now(),
                    title: '新战略推演',
                    messages: [{ 
                        role: 'assistant', 
                        content: '您好。我是您的战略导师。无论是存量博弈的纠缠，还是心智占领的宏图，请详述您的现状。我们将以矛盾论为引，拨开商业的迷雾。' 
                    }],
                    canvasData: { 
                        industry: '导师感知中...', 
                        problem: '待矛盾识别...', 
                        risk: '待压力测试...',
                        positioning: '待推演博弈路径...'
                    }
                }];
            });
            const [currentSessionId, setCurrentSessionId] = useState(sessions[0].id);
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [activeTab, setActiveTab] = useState('chat');
            const [customKey, setCustomKey] = useState(localStorage.getItem('gemini_api_key_pro') || "");
            const [showSettings, setShowSettings] = useState(false);

            const scrollRef = useRef(null);
            const currentSession = sessions.find(s => s.id === currentSessionId) || sessions[0];

            useEffect(() => {
                localStorage.setItem('shangjing_pro_v1', JSON.stringify(sessions));
            }, [sessions]);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                if (window.lucide) window.lucide.createIcons();
            }, [currentSession.messages, activeTab, isSidebarOpen]);

            const callGemini = async (userText) => {
                const apiKey = customKey || "";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                if (!response.ok) throw new Error('API Error');
                return await response.json();
            };

            const handleSend = async () => {
                if (!input.trim() || isTyping) return;
                const userText = input;
                const updatedSessionsBefore = sessions.map(s => s.id === currentSessionId ? { ...s, messages: [...s.messages, { role: 'user', content: userText }] } : s);
                setSessions(updatedSessionsBefore);
                setInput('');
                setIsTyping(true);

                try {
                    const result = await callGemini(userText);
                    const aiRaw = result.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                    const aiData = JSON.parse(aiRaw);
                    
                    setSessions(updatedSessionsBefore.map(s => {
                        if (s.id === currentSessionId) {
                            return { 
                                ...s, 
                                title: s.messages.length <= 2 ? userText.slice(0, 10) : s.title,
                                messages: [...s.messages, { role: 'assistant', content: aiData.reply }],
                                canvasData: { ...s.canvasData, ...aiData.canvasUpdate }
                            };
                        }
                        return s;
                    }));
                } catch (error) {
                    setSessions(prev => prev.map(s => s.id === currentSessionId ? { ...s, messages: [...s.messages, { role: 'assistant', content: "思维暂时受阻。请点击左下角齿轮配置 API Key 后再试。" }] } : s));
                } finally {
                    setIsTyping(false);
                }
            };

            const createNewSession = () => {
                const newId = Date.now();
                setSessions([{ 
                    id: newId, 
                    title: '新推演对话', 
                    messages: [{role:'assistant', content:'新推演室已就绪。请告诉导师，您目前的商业博弈中，最让您感到“虚”或“实”的地方在哪里？'}], 
                    canvasData: { industry: '待命...', problem: '待命...', risk: '待命...', positioning: '待命...' } 
                }, ...sessions]);
                setCurrentSessionId(newId);
                setSidebarOpen(false);
            };

            return (
                <div className="flex h-screen overflow-hidden relative">
                    {/* 手机端遮罩 */}
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/30 z-40 lg:hidden backdrop-blur-sm" onClick={() => setSidebarOpen(false)} />}

                    {/* 设置弹窗 */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[60] p-6">
                            <div className="bg-white rounded-3xl p-10 max-w-sm w-full shadow-2xl text-center">
                                <h3 className="font-serif-sc text-2xl mb-4 text-[#5c5c54]">导师觉醒配置</h3>
                                <p className="text-[12px] text-stone-400 mb-8 leading-relaxed px-4 text-center">由于 GitHub 并不自带算力，运行在线版需配置您个人的 Gemini API Key。</p>
                                <input 
                                    type="password" 
                                    className="w-full border-2 border-stone-100 rounded-xl px-5 py-3 text-sm focus:border-[#a89078] outline-none mb-8 text-center transition-all"
                                    placeholder="输入您的 Gemini API Key"
                                    value={customKey}
                                    onChange={(e) => {setCustomKey(e.target.value); localStorage.setItem('gemini_api_key_pro', e.target.value);}}
                                />
                                <button onClick={() => setShowSettings(false)} className="w-full bg-[#2a2a2a] text-white py-4 rounded-xl text-xs font-bold tracking-[0.2em] hover:bg-stone-800 transition-colors">确认觉醒</button>
                            </div>
                        </div>
                    )}

                    {/* 侧边栏 */}
                    <aside className={`sidebar-transition fixed lg:static z-50 h-full sidebar-bg border-r border-[#e5e1d5] flex flex-col w-72 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-72'}`}>
                        <div className="p-6">
                            <button onClick={createNewSession} className="w-full py-3.5 px-4 rounded-2xl border-2 border-dashed border-stone-300 text-stone-400 hover:border-[#a89078] hover:text-[#a89078] transition-all flex items-center justify-center gap-2 text-sm font-bold">
                                <i data-lucide="plus" className="w-4 h-4"></i> 新建战略推演
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto px-4 space-y-2 no-scrollbar">
                            <p className="px-2 text-[10px] text-[#b5b5ad] uppercase tracking-widest font-bold mb-4 mt-2">历史记录分类</p>
                            {sessions.map(s => (
                                <div key={s.id} onClick={() => { setCurrentSessionId(s.id); setSidebarOpen(false); }} className={`p-4 rounded-2xl cursor-pointer transition-all ${currentSessionId === s.id ? 'active-session shadow-sm' : 'text-[#8a8a80] hover:bg-white/40'}`}>
                                    <div className="flex items-center gap-3 truncate">
                                        <i data-lucide="message-square" className="w-4 h-4 shrink-0"></i>
                                        <span className="text-sm truncate font-medium">{s.title}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-8 border-t border-[#e5e1d5] flex items-center justify-between bg-stone-50/50">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 rounded-full bg-[#a89078] flex items-center justify-center text-white text-[11px] font-bold shadow-inner">L</div>
                                <span className="text-xs font-bold text-[#b5b5ad] tracking-widest">LANLAN</span>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="text-[#c5c5bd] hover:text-[#a89078] transition-all transform hover:rotate-90">
                                <i data-lucide="settings" className="w-5 h-5"></i>
                            </button>
                        </div>
                    </aside>

                    {/* 主内容 */}
                    <main className="flex-1 flex flex-col min-w-0 h-full bg-[#f8f7f4]">
                        <header className="px-6 py-6 flex justify-between items-center border-b border-[#e5e1d5] bg-[#f8f7f4]/80 backdrop-blur-md sticky top-0 z-30">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setSidebarOpen(true)} className="p-2 hover:bg-[#e9e7dc] rounded-lg text-[#a89078] lg:hidden">
                                    <i data-lucide="menu" className="w-6 h-6"></i>
                                </button>
                                <div>
                                    <h1 className="text-xl lg:text-2xl font-serif-sc tracking-[0.2em] text-[#5c5c54] uppercase">战略智慧导师</h1>
                                    <p className="hidden lg:block text-[9px] text-[#b5b5ad] mt-1 uppercase tracking-widest">Intelligence Driven by Gemini 2.5</p>
                                </div>
                            </div>
                            <div className="flex bg-[#e9e7dc] p-1 rounded-full border border-[#dcd9cc] shadow-inner">
                                <button onClick={() => setActiveTab('chat')} className={`px-5 lg:px-8 py-2 rounded-full text-xs font-bold transition-all ${activeTab === 'chat' ? 'bg-white text-[#5c5c54] shadow-sm' : 'text-[#a0a096]'}`}>对话</button>
                                <button onClick={() => setActiveTab('canvas')} className={`px-5 lg:px-8 py-2 rounded-full text-xs font-bold transition-all ${activeTab === 'canvas' ? 'bg-white text-[#5c5c54] shadow-sm' : 'text-[#a0a096]'}`}>画布</button>
                            </div>
                        </header>

                        <div className="flex-1 flex overflow-hidden">
                            {/* 对话窗口 */}
                            <div className={`flex-1 flex flex-col h-full ${activeTab === 'canvas' ? 'hidden lg:flex' : 'flex'}`}>
                                <div ref={scrollRef} className="flex-1 overflow-y-auto px-6 lg:px-24 py-10 space-y-12 no-scrollbar">
                                    {currentSession.messages.map((msg, idx) => (
                                        <div key={idx} className={`flex message-fade ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`flex gap-6 max-w-[95%] lg:max-w-3xl ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                                {/* 只有勋章头像，没有任何文字名字 */}
                                                <div className={`w-11 h-11 rounded-2xl flex items-center justify-center shrink-0 shadow-sm ${msg.role === 'assistant' ? 'bg-[#2a2a2a] text-[#f8f7f4]' : 'bg-[#a89078] text-white'}`}>
                                                    {msg.role === 'assistant' ? <i data-lucide="scroll-text" className="w-6 h-6"></i> : <span className="text-[16px] font-bold">L</span>}
                                                </div>
                                                <div className={`mt-1.5 leading-relaxed text-[16px] lg:text-[17px] ${msg.role === 'user' ? 'text-[#8a8a80] text-right' : 'text-[#4a4a4a] font-serif-sc italic text-left'}`}>
                                                    {msg.content}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {isTyping && (
                                        <div className="ml-16 flex gap-2 items-center">
                                            <div className="w-1.5 h-1.5 bg-[#a89078] rounded-full animate-bounce"></div>
                                            <div className="w-1.5 h-1.5 bg-[#a89078] rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                            <div className="w-1.5 h-1.5 bg-[#a89078] rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                        </div>
                                    )}
                                    <div className="h-10"></div>
                                </div>
                                
                                {/* 输入框 */}
                                <div className="px-6 lg:px-24 pb-12">
                                    <div className="max-w-4xl mx-auto relative group">
                                        <div className="bg-white border-2 border-[#e5e1d5] rounded-2xl p-2 shadow-sm focus-within:border-[#a89078] transition-all flex items-end">
                                            <textarea 
                                                className="w-full bg-transparent border-none focus:ring-0 px-5 py-4 text-base resize-none h-16 no-scrollbar" 
                                                placeholder="请详述您的困惑或破局构思..." 
                                                value={input} 
                                                onChange={(e) => setInput(e.target.value)} 
                                                onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())}
                                            />
                                            <button onClick={handleSend} className="p-4 text-[#d0cec1] hover:text-[#a89078] transition-colors">
                                                <i data-lucide="arrow-up-right" className="w-8 h-8"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 画布窗口 */}
                            <div className={`w-full lg:w-[520px] bg-white border-l border-[#f0eee0] flex flex-col transition-all h-full ${activeTab === 'chat' ? 'hidden lg:flex' : 'flex'}`}>
                                <div className="flex-1 overflow-y-auto p-10 lg:p-16 space-y-16 no-scrollbar">
                                    <div>
                                        <h2 className="text-4xl font-serif-sc text-[#5c5c54] mb-3 tracking-tight">战略推演画布</h2>
                                        <div className="h-0.5 w-12 bg-[#5c5c54] mb-4"></div>
                                        <p className="text-[10px] text-[#a89078] uppercase tracking-[0.3em] font-bold opacity-70">THE STRATEGIC MAPPING CANVAS</p>
                                    </div>
                                    <div className="space-y-14 lg:space-y-16">
                                        <CanvasCard icon="globe" title="行业核心本质" content={currentSession.canvasData.industry} />
                                        <CanvasCard icon="zap" title="主要矛盾识别" content={currentSession.canvasData.problem} />
                                        <CanvasCard icon="shield-alert" title="思维漏洞与风险" content={currentSession.canvasData.risk} />
                                        <CanvasCard icon="search" title="博弈定位与执行" content={currentSession.canvasData.positioning} />
                                    </div>
                                    <div className="pt-20 border-t border-[#f0eee0] text-center">
                                        <p className="text-[11px] text-[#c5c5bd] font-serif-sc italic leading-relaxed px-10">
                                            “兵形象水，水之形，避高而趋下；兵之形，避实而击虚。”
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const CanvasCard = ({ icon, title, content }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return (
                <div className="flex gap-8 items-start group">
                    <div className="w-14 h-14 rounded-full border border-[#f0eee0] flex items-center justify-center shrink-0 text-[#c5c5bd] bg-[#fdfdfd] shadow-sm transition-all duration-500 group-hover:bg-[#2a2a2a] group-hover:text-white">
                        <i data-lucide={icon} className="w-6 h-6" strokeWidth={1}></i>
                    </div>
                    <div className="flex-1 pt-1">
                        <h4 className="text-[11px] font-bold text-[#b5b5ad] uppercase tracking-[0.2em] mb-4 font-sans">{title}</h4>
                        <p className="text-[15px] lg:text-[16px] text-[#6a6a60] font-serif-sc italic leading-relaxed opacity-90">{content}</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
